<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2026 Fantasy Baseball Draft Order</title>
  <style>
    :root {
      --bg: #f2f6fa;
      --panel: #ffffff;
      --text: #102231;
      --muted: #5d6f7f;
      --line: #d6dfe8;
      --accent: #0b6fb7;
      --link: #1d5f94;
      --shadow: 0 10px 22px rgba(16, 24, 40, 0.08);
      --radius: 12px;
      --li-pad-y: 7px;
      --team-font-size: 0.92rem;
      --player-font-size: 0.82rem;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, #ffffff 0%, var(--bg) 48%, #e7eef5 100%);
    }
    .wrap {
      max-width: 1500px;
      margin: 0 auto;
      padding: 22px 16px 36px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.35rem, 2.4vw, 1.95rem);
    }
    .sub {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .pill {
      display: inline-block;
      margin-left: 8px;
      padding: 2px 9px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-size: 0.74rem;
      font-weight: 600;
      vertical-align: middle;
    }
    .rounds {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
      gap: 14px;
    }
    .round {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .round h2 {
      margin: 0;
      padding: 10px 12px;
      font-size: 0.95rem;
      background: #ecf2f8;
      border-bottom: 1px solid var(--line);
    }
    ol {
      margin: 0;
      padding: 8px 10px 12px;
      list-style: none;
    }
    li {
      padding: var(--li-pad-y) 0;
      padding-left: 8px;
      padding-right: 8px;
      border-bottom: 1px dashed #e3e9f0;
      line-height: 1.2;
      border-radius: 8px;
    }
    li + li {
      margin-top: 4px;
    }
    li:last-child { border-bottom: 0; }
    li.has-keeper {
      background: #f3f5f7;
    }
    .pick-row {
      display: grid;
      grid-template-columns: 42px 14px minmax(0, 1fr) 64px;
      gap: 8px;
      align-items: stretch;
    }
    .round-pick {
      font-size: 0.78rem;
      font-weight: 700;
      color: #5c7388;
      background: #edf3f8;
      border: 1px solid #d4e0ea;
      border-radius: 999px;
      padding: 0 8px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-self: start;
      align-self: center;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .team-swatch {
      width: 100%;
      height: 100%;
      align-self: stretch;
      border-radius: 3px;
      box-shadow: 0 0 0 1px rgba(16, 34, 49, 0.12);
    }
    .pick-main {
      min-width: 0;
    }
    .team-name {
      display: block;
      font-size: var(--team-font-size);
      font-weight: 600;
      overflow-wrap: anywhere;
    }
    .overall-cell {
      font-size: 0.78rem;
      font-weight: 700;
      color: #5c7388;
      background: #edf3f8;
      border: 1px solid #d4e0ea;
      border-radius: 999px;
      padding: 0 8px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-self: end;
      align-self: center;
      margin-top: 1px;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    .player {
      display: block;
      margin-top: 2px;
      font-size: var(--player-font-size);
      color: var(--link);
      overflow-wrap: anywhere;
    }
    .player.empty {
      color: #8c99a6;
      font-style: italic;
    }
    .player a {
      color: var(--link);
      text-decoration: none;
    }
    .player a:hover { text-decoration: underline; }
    .legend {
      margin-top: 14px;
      font-size: 0.84rem;
      color: var(--muted);
    }
    .controls {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: 2fr 1.2fr 1fr auto;
      gap: 10px;
      align-items: end;
      padding: 10px;
      margin: 0 0 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(3px);
      box-shadow: var(--shadow);
    }
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .control-group label {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    .control-group input,
    .control-group select {
      width: 100%;
      height: 36px;
      border: 1px solid #cdd8e3;
      border-radius: 8px;
      padding: 0 10px;
      font-size: 0.9rem;
      color: var(--text);
      background: #fff;
    }
    .control-group select:disabled {
      background: #eef3f8;
      color: #8493a0;
      cursor: not-allowed;
    }
    .control-group input:focus,
    .control-group select:focus,
    .control-actions button:focus {
      outline: 2px solid #9ec8eb;
      outline-offset: 1px;
      border-color: var(--accent);
    }
    .control-actions {
      display: flex;
      align-items: end;
      gap: 8px;
    }
    .control-actions button {
      height: 36px;
      border: 1px solid #bdd2e4;
      border-radius: 8px;
      background: #f2f7fc;
      color: #0f3f67;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .control-actions button:hover {
      background: #e7f1fa;
    }
    .results {
      grid-column: 1 / -1;
      font-size: 0.82rem;
      color: var(--muted);
      min-height: 1.1rem;
    }
    .filter-tags {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 1.2rem;
    }
    .filter-tag {
      border: 1px solid #c7d7e6;
      border-radius: 999px;
      background: #edf5fc;
      color: #1b4264;
      font-size: 0.76rem;
      padding: 3px 9px;
      cursor: pointer;
    }
    .filter-tag:hover {
      background: #e4f0fb;
    }
    .filter-tag .x {
      margin-left: 4px;
      font-weight: 700;
    }
    .round {
      scroll-margin-top: 84px;
    }
    .no-results {
      border: 1px dashed #bfd1e2;
      border-radius: var(--radius);
      background: #f8fbfe;
      padding: 18px;
      color: #3e556a;
      text-align: center;
    }
    .no-results p {
      margin: 0 0 10px;
    }
    .no-results button {
      height: 34px;
      border: 1px solid #bdd2e4;
      border-radius: 8px;
      background: #f2f7fc;
      color: #0f3f67;
      font-size: 0.84rem;
      font-weight: 600;
      padding: 0 12px;
      cursor: pointer;
    }
    mark {
      background: #ffef9c;
      color: inherit;
      border-radius: 3px;
      padding: 0 1px;
    }
    body.density-compact {
      --li-pad-y: 4px;
      --team-font-size: 0.84rem;
      --player-font-size: 0.75rem;
    }
    body.density-compact .round h2 {
      padding: 8px 10px;
      font-size: 0.88rem;
    }
    @media (max-width: 900px) {
      .controls {
        grid-template-columns: 1fr 1fr;
      }
      .control-actions {
        grid-column: 1 / -1;
      }
    }
    @media (max-width: 640px) {
      .wrap { padding: 14px 10px 24px; }
      .controls {
        position: static;
        grid-template-columns: 1fr;
      }
      .control-actions {
        grid-column: auto;
      }
      .rounds { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>2026 Fantasy Baseball Draft Order <span class="pill">From 2026.xlsx</span></h1>
    <p class="sub">Round order, traded picks, players, and player links are sourced from the spreadsheet.</p>

    <section class="controls" aria-label="Draft filters">
      <div class="control-group">
        <label for="searchInput">Search</label>
        <input id="searchInput" type="search" placeholder="Search player or team" autocomplete="off" />
      </div>
      <div class="control-group">
        <label for="teamSelect">Team</label>
        <select id="teamSelect">
          <option value="">All teams</option>
        </select>
      </div>
      <div class="control-group">
        <label for="viewSelect">Sort mode</label>
        <select id="viewSelect">
          <option value="round">By Round</option>
          <option value="team">By Team Timeline</option>
        </select>
      </div>
      <div class="control-group">
        <label for="roundSelect">Round jump</label>
        <select id="roundSelect">
          <option value="">Select round</option>
        </select>
      </div>
      <div class="control-actions">
        <button id="densityBtn" type="button" aria-pressed="false">Compact view</button>
        <button id="clearBtn" type="button">Clear filters</button>
      </div>
      <div id="resultsSummary" class="results" aria-live="polite"></div>
      <div id="activeFilters" class="filter-tags" aria-live="polite"></div>
    </section>

    <section id="rounds" class="rounds" aria-label="Draft order by round"></section>
    <p class="legend">Team names are expanded from the truncated labels in the workbook.</p>
  </main>

            state.q = '';
            searchInput.value = '';
          } else if (tag.key === 'team') {
            state.team = '';
            teamSelect.value = '';
          } else if (tag.key === 'view') {
            state.view = 'round';
            viewSelect.value = 'round';
            syncRoundControl();
          } else if (tag.key === 'round') {
            state.round = '';
            roundSelect.value = '';
          }
          applyAndRender();
        });
        activeFilters.appendChild(btn);
      });
    }

    function appendHighlightedText(parent, text, query) {
      if (!query) {
        parent.textContent = text;
        return;
      }

      const regex = new RegExp(escapeRegExp(query), 'ig');
      let lastIndex = 0;
      let match;

      while ((match = regex.exec(text)) !== null) {
        if (match.index > lastIndex) {
          parent.appendChild(document.createTextNode(text.slice(lastIndex, match.index)));
        }
        const mark = document.createElement('mark');
        mark.textContent = text.slice(match.index, match.index + match[0].length);
        parent.appendChild(mark);
        lastIndex = match.index + match[0].length;
      }

      if (lastIndex < text.length) {
        parent.appendChild(document.createTextNode(text.slice(lastIndex)));
      }
    }

    function buildPickRow(pick, roundNumber, query) {
      const item = document.createElement('li');
      item.className = 'pick-row';
      if (pick.player) {
        item.classList.add('has-keeper');
      }

      const roundPick = document.createElement('span');
      roundPick.className = 'round-pick';
      roundPick.textContent = `${pick.pick}`;

      const swatch = document.createElement('span');
      swatch.className = 'team-swatch';
      swatch.style.background = teamColor(pick.team);

      const main = document.createElement('div');
      main.className = 'pick-main';

      const teamName = document.createElement('span');
      teamName.className = 'team-name';
      appendHighlightedText(teamName, pick.team, query);

      const player = document.createElement('span');
      player.className = pick.player ? 'player' : 'player empty';
      if (pick.player) {
        if (pick.url) {
          const a = document.createElement('a');
          a.href = pick.url;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          appendHighlightedText(a, pick.player, query);
          player.appendChild(a);
        } else {
          appendHighlightedText(player, pick.player, query);
        }
      } else {
        player.textContent = 'Open pick';
      }

      const overall = document.createElement('span');
      overall.className = 'overall-cell';
      overall.textContent = `#${getOverallPick(roundNumber, pick.pick)}`;

      main.appendChild(teamName);
      main.appendChild(player);
      item.appendChild(roundPick);
      item.appendChild(swatch);
      item.appendChild(main);
      item.appendChild(overall);

      return item;
    }

    function matchesPick(pick, qLower, selectedTeam) {
      const teamMatches = !selectedTeam || pick.team === selectedTeam;
      if (!teamMatches) {
        return false;
      }

      if (!qLower) {
        return true;
      }

      return pick.team.toLowerCase().includes(qLower) || pick.player.toLowerCase().includes(qLower);
    }

    function updateUrl() {
      const url = new URL(window.location.href);
      url.searchParams.delete('q');
      url.searchParams.delete('team');
      url.searchParams.delete('view');
      url.searchParams.delete('round');

      if (state.q) {
        url.searchParams.set('q', state.q);
      }
      if (state.team) {
        url.searchParams.set('team', state.team);
      }
      if (state.view === 'team') {
        url.searchParams.set('view', 'team');
      }
      if (state.view === 'round' && state.round) {
        url.searchParams.set('round', state.round);
      }

      history.replaceState(null, '', `${url.pathname}${url.search}${url.hash}`);
    }

    function scrollToRound(roundValue) {
      if (!roundValue) {
        return;
      }
      const target = document.getElementById(`round-${roundValue}`);
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function render() {
      roundsEl.innerHTML = '';

      const q = state.q;
      const qLower = q.toLowerCase();
      const selectedTeam = state.team;
      let shownPicks = 0;
      let shownTeamPicks = 0;

      if (state.view === 'round') {
        rounds.forEach((round) => {
          const filtered = round.picks.filter((pick) => matchesPick(pick, qLower, selectedTeam));
          if (filtered.length === 0) {
            return;
          }

          const card = document.createElement('article');
          card.className = 'round';
          card.id = `round-${round.round}`;

          const h2 = document.createElement('h2');
          h2.textContent = `Round ${round.round}`;
          card.appendChild(h2);

          const list = document.createElement('ol');

          filtered.forEach((pick) => {
            shownPicks += 1;
            if (selectedTeam && pick.team === selectedTeam) {
              shownTeamPicks += 1;
            }
            list.appendChild(buildPickRow(pick, round.round, q));
          });

          card.appendChild(list);
          roundsEl.appendChild(card);
        });
      } else {
        const teamsToRender = selectedTeam ? [selectedTeam] : uniqueTeams;

        teamsToRender.forEach((teamName) => {
          const timelinePicks = [];
          rounds.forEach((round) => {
            round.picks.forEach((pick) => {
              if (pick.team !== teamName) {
                return;
              }
              const matchesQuery = !qLower
                || pick.team.toLowerCase().includes(qLower)
                || pick.player.toLowerCase().includes(qLower);
              if (!matchesQuery) {
                return;
              }
              timelinePicks.push({ ...pick, round: round.round });
            });
          });

          timelinePicks.sort((a, b) => (a.round - b.round) || (a.pick - b.pick));
          if (timelinePicks.length === 0) {
            return;
          }

          const card = document.createElement('article');
          card.className = 'round';
          card.id = `team-${teamName.toLowerCase().replace(/[^a-z0-9]+/g, '-')}`;

          const h2 = document.createElement('h2');
          h2.textContent = teamName;
          h2.style.borderLeft = `4px solid ${teamColor(teamName)}`;
          h2.style.paddingLeft = '10px';
          card.appendChild(h2);

          const list = document.createElement('ol');
          timelinePicks.forEach((pick) => {
            shownPicks += 1;
            if (selectedTeam && pick.team === selectedTeam) {
              shownTeamPicks += 1;
            }
            list.appendChild(buildPickRow(pick, pick.round, q));
          });

          card.appendChild(list);
          roundsEl.appendChild(card);
        });
      }

      if (shownPicks === 0) {
        const empty = document.createElement('div');
        empty.className = 'no-results';
        empty.innerHTML = '<p>No picks match the current filters.</p>';
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = 'Reset filters';
        btn.addEventListener('click', () => {
          resetFilters();
          applyAndRender();
        });
        empty.appendChild(btn);
        roundsEl.appendChild(empty);
      }

      let summary = `Showing ${shownPicks} of ${totalPicks} picks`;
      if (selectedTeam) {
        summary += ` · ${selectedTeam}: ${shownTeamPicks} picks`;
      }
      if (state.view === 'round' && state.round && !document.getElementById(`round-${state.round}`)) {
        summary += ` · Round ${state.round} hidden by current filters`;
      }
      resultsSummary.textContent = summary;
      renderFilterTags();
    }

    function applyAndRender() {
      updateUrl();
      render();
    }

    searchInput.addEventListener('input', () => {
      state.q = searchInput.value.trim();
      applyAndRender();
    });

    teamSelect.addEventListener('change', () => {
      state.team = teamSelect.value;
      applyAndRender();
    });

    viewSelect.addEventListener('change', () => {
      state.view = viewSelect.value;
      if (state.view === 'team') {
        state.round = '';
      }
      syncRoundControl();
      applyAndRender();
    });

    roundSelect.addEventListener('change', () => {
      if (state.view !== 'round') {
        return;
      }
      state.round = roundSelect.value;
      updateUrl();
      scrollToRound(state.round);
      renderFilterTags();
    });

    densityBtn.addEventListener('click', () => {
      state.density = state.density === 'compact' ? 'comfortable' : 'compact';
      document.body.classList.toggle('density-compact', state.density === 'compact');
      densityBtn.setAttribute('aria-pressed', String(state.density === 'compact'));
      densityBtn.textContent = state.density === 'compact' ? 'Comfortable view' : 'Compact view';
      localStorage.setItem('draftDensity', state.density);
    });

    clearBtn.addEventListener('click', () => {
      resetFilters();
      applyAndRender();
    });

    render();
    if (state.round) {
      setTimeout(() => scrollToRound(state.round), 0);
    }
  </script>
</body>
</html>
