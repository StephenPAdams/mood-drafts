<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2026 Fantasy Baseball Draft Order</title>
  <link rel="icon" type="image/png" href="img/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg" />
  <link rel="shortcut icon" href="img/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png" />
  <link rel="manifest" href="img/site.webmanifest" />
  <style>
    :root {
      --bg: #f2f6fa;
      --panel: #ffffff;
      --text: #102231;
      --muted: #5d6f7f;
      --line: #d6dfe8;
      --accent: #0b6fb7;
      --link: #1d5f94;
      --shadow: 0 10px 22px rgba(16, 24, 40, 0.08);
      --radius: 12px;
      --li-pad-y: 7px;
      --team-font-size: 0.92rem;
      --player-font-size: 0.82rem;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, #ffffff 0%, var(--bg) 48%, #e7eef5 100%);
    }
    .wrap {
      max-width: 1500px;
      margin: 0 auto;
      padding: 22px 16px 36px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.35rem, 2.4vw, 1.95rem);
    }
    .sub {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 0.95rem;
    }
    .pill {
      display: inline-block;
      margin-left: 8px;
      padding: 2px 9px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      font-size: 0.74rem;
      font-weight: 600;
      vertical-align: middle;
    }
    .rounds {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(310px, 1fr));
      gap: 14px;
    }
    .round {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .round h2 {
      margin: 0;
      padding: 10px 12px;
      font-size: 0.95rem;
      background: #ecf2f8;
      border-bottom: 1px solid var(--line);
    }
    ol {
      margin: 0;
      padding: 8px 10px 12px;
      list-style: none;
    }
    li {
      padding: var(--li-pad-y) 0;
      padding-left: 8px;
      padding-right: 8px;
      border-bottom: 1px dashed #e3e9f0;
      line-height: 1.2;
      border-radius: 8px;
    }
    li + li {
      margin-top: 4px;
    }
    li:last-child { border-bottom: 0; }
    li.has-keeper {
      background: #f3f5f7;
    }
    .pick-row {
      display: grid;
      grid-template-columns: 42px 14px minmax(0, 1fr) 64px;
      gap: 8px;
      align-items: stretch;
    }
    .round-pick {
      font-size: 0.78rem;
      font-weight: 700;
      color: #5c7388;
      background: #edf3f8;
      border: 1px solid #d4e0ea;
      border-radius: 999px;
      padding: 0 8px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-self: start;
      align-self: center;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .team-swatch {
      width: 100%;
      height: 100%;
      align-self: stretch;
      border-radius: 3px;
      box-shadow: 0 0 0 1px rgba(16, 34, 49, 0.12);
    }
    .pick-main {
      min-width: 0;
    }
    .team-name {
      display: block;
      font-size: var(--team-font-size);
      font-weight: 600;
      overflow-wrap: anywhere;
    }
    .overall-cell {
      font-size: 0.78rem;
      font-weight: 700;
      color: #5c7388;
      background: #edf3f8;
      border: 1px solid #d4e0ea;
      border-radius: 999px;
      padding: 0 8px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-self: end;
      align-self: center;
      margin-top: 1px;
      white-space: nowrap;
      font-variant-numeric: tabular-nums;
    }
    .player {
      display: block;
      margin-top: 2px;
      font-size: var(--player-font-size);
      color: var(--link);
      overflow-wrap: anywhere;
    }
    .player.empty {
      color: #8c99a6;
      font-style: italic;
    }
    .player a {
      color: var(--link);
      text-decoration: none;
    }
    .player a:hover { text-decoration: underline; }
    .injury-pill {
      display: inline-flex;
      align-items: center;
      margin-left: 6px;
      padding: 1px 7px;
      border-radius: 999px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.01em;
      border: 1px solid #d6b45a;
      background: #fff4cf;
      color: #6d4e03;
      vertical-align: middle;
      white-space: nowrap;
    }
    .comment-target {
      cursor: help;
    }
    .comment-target:focus-visible {
      outline: 2px solid #9ec8eb;
      outline-offset: 1px;
      border-radius: 4px;
    }
    .legend {
      margin-top: 14px;
      font-size: 0.84rem;
      color: var(--muted);
    }
    .controls {
      position: sticky;
      top: 0;
      z-index: 20;
      display: grid;
      grid-template-columns: 2fr 1.2fr 1fr auto;
      gap: 10px;
      align-items: end;
      padding: 10px;
      margin: 0 0 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(3px);
      box-shadow: var(--shadow);
    }
    .control-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }
    .control-group label {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    .control-group input,
    .control-group select {
      width: 100%;
      height: 36px;
      border: 1px solid #cdd8e3;
      border-radius: 8px;
      padding: 0 10px;
      font-size: 0.9rem;
      color: var(--text);
      background: #fff;
    }
    .keepers-group .keepers-toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      height: 36px;
      border: 1px solid #cdd8e3;
      border-radius: 8px;
      padding: 0 10px;
      background: #fff;
      font-size: 0.84rem;
      color: #3f5669;
      user-select: none;
      cursor: pointer;
    }
    .keepers-group .keepers-toggle:focus-within {
      outline: 2px solid #9ec8eb;
      outline-offset: 1px;
      border-color: var(--accent);
    }
    .keepers-group .keepers-toggle input {
      width: 16px;
      height: 16px;
      margin: 0;
      accent-color: #0b6fb7;
    }
    .control-group select:disabled {
      background: #eef3f8;
      color: #8493a0;
      cursor: not-allowed;
    }
    .control-group input:focus,
    .control-group select:focus,
    .control-actions button:focus {
      outline: 2px solid #9ec8eb;
      outline-offset: 1px;
      border-color: var(--accent);
    }
    .control-actions {
      display: flex;
      align-items: end;
      gap: 8px;
    }
    .control-actions button {
      height: 36px;
      border: 1px solid #bdd2e4;
      border-radius: 8px;
      background: #f2f7fc;
      color: #0f3f67;
      font-size: 0.85rem;
      font-weight: 600;
      padding: 0 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .control-actions button:hover {
      background: #e7f1fa;
    }
    .results {
      grid-column: 1 / -1;
      font-size: 0.82rem;
      color: var(--muted);
      min-height: 1.1rem;
    }
    .filter-tags {
      grid-column: 1 / -1;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 1.2rem;
    }
    .filter-tag {
      border: 1px solid #c7d7e6;
      border-radius: 999px;
      background: #edf5fc;
      color: #1b4264;
      font-size: 0.76rem;
      padding: 3px 9px;
      cursor: pointer;
    }
    .filter-tag:hover {
      background: #e4f0fb;
    }
    .filter-tag .x {
      margin-left: 4px;
      font-weight: 700;
    }
    .injury-panel {
      margin: 0 0 14px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.96);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .injury-panel details {
      width: 100%;
    }
    .injury-panel summary {
      list-style: none;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      font-size: 0.92rem;
      font-weight: 700;
      background: #ecf2f8;
      border-bottom: 1px solid var(--line);
      cursor: pointer;
      user-select: none;
    }
    .injury-panel summary::-webkit-details-marker {
      display: none;
    }
    .injury-summary-count {
      font-size: 0.78rem;
      color: var(--muted);
      font-weight: 600;
    }
    .injury-wrap {
      padding: 8px 10px 10px;
    }
    .injury-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
      font-size: 0.82rem;
    }
    .injury-table th,
    .injury-table td {
      padding: 8px 8px;
      border-bottom: 1px dashed #e3e9f0;
      vertical-align: top;
      text-align: left;
    }
    .injury-table th {
      color: var(--muted);
      font-size: 0.74rem;
      letter-spacing: 0.01em;
      font-weight: 700;
      background: #f6f9fc;
    }
    .injury-table tbody tr:last-child td {
      border-bottom: 0;
    }
    .injury-col-player { width: 32%; }
    .injury-col-team { width: 28%; }
    .injury-col-return { width: 20%; }
    .injury-col-status { width: 20%; }
    .injury-inline-btn {
      border: 0;
      background: transparent;
      color: inherit;
      font: inherit;
      margin: 0;
      padding: 0;
      text-align: left;
    }
    .injury-status-pill {
      display: inline-flex;
      align-items: center;
      border: 1px solid #d9e2ea;
      border-radius: 999px;
      background: #f3f7fb;
      color: #314d64;
      font-size: 0.72rem;
      font-weight: 700;
      padding: 2px 8px;
      white-space: nowrap;
    }
    .injury-empty {
      padding: 12px 8px;
      color: #566c7f;
      font-size: 0.84rem;
      text-align: center;
    }
    .injury-tooltip {
      position: fixed;
      max-width: 320px;
      background: #102231;
      color: #f2f7fc;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.24);
      padding: 8px 10px;
      font-size: 0.76rem;
      line-height: 1.35;
      z-index: 60;
      pointer-events: none;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 90ms ease, transform 90ms ease;
    }
    .injury-tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .round {
      scroll-margin-top: 84px;
    }
    .no-results {
      border: 1px dashed #bfd1e2;
      border-radius: var(--radius);
      background: #f8fbfe;
      padding: 18px;
      color: #3e556a;
      text-align: center;
    }
    .no-results p {
      margin: 0 0 10px;
    }
    .no-results button {
      height: 34px;
      border: 1px solid #bdd2e4;
      border-radius: 8px;
      background: #f2f7fc;
      color: #0f3f67;
      font-size: 0.84rem;
      font-weight: 600;
      padding: 0 12px;
      cursor: pointer;
    }
    mark {
      background: #ffef9c;
      color: inherit;
      border-radius: 3px;
      padding: 0 1px;
    }
    body.density-compact {
      --li-pad-y: 4px;
      --team-font-size: 0.84rem;
      --player-font-size: 0.75rem;
    }
    body.density-compact .round h2 {
      padding: 8px 10px;
      font-size: 0.88rem;
    }
    @media (max-width: 900px) {
      .controls {
        grid-template-columns: 1fr 1fr;
      }
      .control-actions {
        grid-column: 1 / -1;
      }
    }
    @media (max-width: 640px) {
      .wrap { padding: 14px 10px 24px; }
      .controls {
        position: static;
        grid-template-columns: 1fr;
      }
      .control-actions {
        grid-column: auto;
      }
      .rounds { grid-template-columns: 1fr; }
      .injury-wrap {
        padding: 0;
      }
      .injury-table thead {
        display: none;
      }
      .injury-table,
      .injury-table tbody,
      .injury-table tr,
      .injury-table td {
        display: block;
        width: 100%;
      }
      .injury-table tr {
        border-bottom: 1px dashed #e3e9f0;
        padding: 10px;
      }
      .injury-table tr:last-child {
        border-bottom: 0;
      }
      .injury-table td {
        border: 0;
        padding: 2px 0;
      }
      .injury-table td::before {
        content: attr(data-label);
        display: block;
        color: var(--muted);
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.01em;
      }
    }
  </style>
</head>

    <h1>2026 Fantasy Baseball Draft Order <span class="pill">From 2026.xlsx</span></h1>
    <p class="sub">Round order, traded picks, players, and player links are sourced from the spreadsheet.</p>

    <section class="controls" aria-label="Draft filters">
      <div class="control-group">
        <label for="searchInput">Search</label>
        <input id="searchInput" type="search" placeholder="Search player or team" autocomplete="off" />
      </div>
      <div class="control-group">
        <label for="teamSelect">Team</label>
        <select id="teamSelect">
          <option value="">All teams</option>
        </select>
      </div>
      <div class="control-group">
        <label for="viewSelect">Sort mode</label>
        <select id="viewSelect">
          <option value="round">By Round</option>
          <option value="team">By Team Timeline</option>
        </select>
      </div>
      <div class="control-group">
        <label for="roundSelect">Round jump</label>
        <select id="roundSelect">
          <option value="">Select round</option>
        </select>
      </div>
      <div class="control-group keepers-group">
        <label for="keepersOnly">Keepers</label>
        <label class="keepers-toggle" for="keepersOnly">
          <input id="keepersOnly" type="checkbox" />
          <span>Keepers only</span>
        </label>
      </div>
      <div class="control-actions">
        <button id="densityBtn" type="button" aria-pressed="false">Compact view</button>
        <button id="clearBtn" type="button">Clear filters</button>
      </div>
      <div id="resultsSummary" class="results" aria-live="polite"></div>
      <div id="activeFilters" class="filter-tags" aria-live="polite"></div>
    </section>
    <section class="injury-panel" aria-label="Injury report">
      <details id="injuryDetails" open>
        <summary>
          <span>Injury Report</span>
          <span id="injurySummaryCount" class="injury-summary-count" aria-live="polite"></span>
        </summary>
        <div class="injury-wrap">
          <table class="injury-table" aria-label="Injured players">
            <thead>
              <tr>
                <th class="injury-col-player">Player</th>
                <th class="injury-col-team">MLB Team</th>
                <th class="injury-col-return">Return</th>
                <th class="injury-col-status">Status</th>
              </tr>
            </thead>
            <tbody id="injuryBody"></tbody>
          </table>
          <div id="injuryEmpty" class="injury-empty" hidden>No injured players match the current filters.</div>
        </div>
      </details>
    </section>

    <section id="rounds" class="rounds" aria-label="Draft order by round"></section>
    <p class="legend">Team names are expanded from the truncated labels in the workbook.</p>
  </main>
  <div id="commentTooltip" class="injury-tooltip" role="tooltip" hidden></div>

    const roundsEl = document.getElementById('rounds');
    const searchInput = document.getElementById('searchInput');
    const teamSelect = document.getElementById('teamSelect');
    const viewSelect = document.getElementById('viewSelect');
    const roundSelect = document.getElementById('roundSelect');
    const keepersOnlyInput = document.getElementById('keepersOnly');
    const densityBtn = document.getElementById('densityBtn');
    const clearBtn = document.getElementById('clearBtn');
    const resultsSummary = document.getElementById('resultsSummary');
    const activeFilters = document.getElementById('activeFilters');
    const injuryBody = document.getElementById('injuryBody');
    const injuryEmpty = document.getElementById('injuryEmpty');
    const injurySummaryCount = document.getElementById('injurySummaryCount');
    const commentTooltip = document.getElementById('commentTooltip');

    const totalPicks = rounds.reduce((sum, round) => sum + round.picks.length, 0);
    const picksPerRound = Math.max(...rounds.map((round) => round.picks.length));
    const uniqueTeams = [...new Set(rounds.flatMap((round) => round.picks.map((pick) => pick.team)))].sort();
    const TEAM_PALETTE = [
      '#0f4c81', // deep blue
      '#d1495b', // red
      '#2a9d8f', // teal
      '#7b2cbf', // violet
      '#f77f00', // orange
      '#3a86ff', // bright blue
      '#8d6e63', // brown
      '#6a994e', // green
      '#ef476f', // pink-red
      '#1f7a8c', // cyan-teal
      '#8338ec', // purple
      '#bc6c25'  // amber-brown
    ];
    const teamColorByName = new Map(
      uniqueTeams.map((team, idx) => [team, TEAM_PALETTE[idx % TEAM_PALETTE.length]])
    );
    const injuryByNameKey = new Map(injuries.map((injury) => [injury.nameKey, injury]));
    const keeperNameKeysByTeam = new Map();

    uniqueTeams.forEach((team) => {
      const option = document.createElement('option');
      option.value = team;
      option.textContent = team;
      teamSelect.appendChild(option);
    });

    rounds.forEach((round) => {
      const option = document.createElement('option');
      option.value = String(round.round);
      option.textContent = `Round ${round.round}`;
      roundSelect.appendChild(option);

      round.picks.forEach((pick) => {
        if (!pick.player) {
          return;
        }
        const set = keeperNameKeysByTeam.get(pick.team) || new Set();
        set.add(normalizeName(extractPlayerName(pick.player)));
        keeperNameKeysByTeam.set(pick.team, set);
      });
    });

    const params = new URLSearchParams(window.location.search);
    const savedDensity = localStorage.getItem('draftDensity');
    const state = {
      q: (params.get('q') || '').trim(),
      team: '',
      view: 'round',
      round: '',
      keepersOnly: params.get('keepers') === '1',
      density: savedDensity === 'compact' ? 'compact' : 'comfortable'
    };

    const paramTeam = params.get('team') || '';
    if (uniqueTeams.includes(paramTeam)) {
      state.team = paramTeam;
    }

    const paramRound = params.get('round') || '';
    if (/^\d+$/.test(paramRound)) {
      const roundNum = Number(paramRound);
      if (roundNum >= 1 && roundNum <= rounds.length) {
        state.round = String(roundNum);
      }
    }

    const paramView = params.get('view') || '';
    if (paramView === 'round' || paramView === 'team') {
      state.view = paramView;
    }

    searchInput.value = state.q;
    teamSelect.value = state.team;
    viewSelect.value = state.view;
    roundSelect.value = state.round;
    keepersOnlyInput.checked = state.keepersOnly;
    document.body.classList.toggle('density-compact', state.density === 'compact');
    densityBtn.setAttribute('aria-pressed', String(state.density === 'compact'));
    densityBtn.textContent = state.density === 'compact' ? 'Comfortable view' : 'Compact view';

    function syncRoundControl() {
      const disabled = state.view === 'team';
      roundSelect.disabled = disabled;
      if (disabled) {
        state.round = '';
        roundSelect.value = '';
      } else {
        roundSelect.value = state.round;
      }
    }

    syncRoundControl();

    function escapeRegExp(value) {
      return value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function normalizeName(value) {
      return (value || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .toLowerCase()
        .replace(/'/g, '')
        .replace(/[^a-z0-9 ]+/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function extractPlayerName(playerText) {
      return (playerText || '').split('(')[0].trim();
    }

    function getInjuryForPick(pick) {
      if (!pick.player) {
        return null;
      }
      const key = normalizeName(extractPlayerName(pick.player));
      return injuryByNameKey.get(key) || null;
    }

    function getFilteredInjuries(qLower, selectedTeam) {
      let scoped = injuries;
      if (selectedTeam) {
        const keeperKeys = keeperNameKeysByTeam.get(selectedTeam) || new Set();
        scoped = scoped.filter((injury) => keeperKeys.has(injury.nameKey));
      }

      if (!qLower) {
        return scoped;
      }

      return scoped.filter((injury) => {
        const haystack = `${injury.name} ${injury.mlbTeam} ${injury.status} ${injury.comment || ''}`.toLowerCase();
        return haystack.includes(qLower);
      });
    }

    function positionTooltip(target) {
      if (!target || commentTooltip.hidden) {
        return;
      }
      const rect = target.getBoundingClientRect();
      const tipRect = commentTooltip.getBoundingClientRect();
      const gap = 8;
      let top = rect.bottom + gap;
      let left = rect.left + ((rect.width - tipRect.width) / 2);

      if (top + tipRect.height > window.innerHeight - 8) {
        top = rect.top - tipRect.height - gap;
      }
      if (left < 8) {
        left = 8;
      } else if (left + tipRect.width > window.innerWidth - 8) {
        left = window.innerWidth - tipRect.width - 8;
      }
      if (top < 8) {
        top = 8;
      }

      commentTooltip.style.top = `${top}px`;
      commentTooltip.style.left = `${left}px`;
    }

    function showTooltip(target) {
      const comment = target.getAttribute('data-comment');
      if (!comment) {
        return;
      }
      commentTooltip.textContent = comment;
      commentTooltip.hidden = false;
      requestAnimationFrame(() => {
        commentTooltip.classList.add('visible');
        positionTooltip(target);
      });
    }

    function hideTooltip() {
      commentTooltip.classList.remove('visible');
      commentTooltip.hidden = true;
    }

    function wireCommentTrigger(el, comment) {
      if (!comment) {
        return;
      }
      el.classList.add('comment-target');
      el.setAttribute('data-comment', comment);
      el.setAttribute('aria-describedby', 'commentTooltip');
      if (el.tabIndex < 0) {
        el.tabIndex = 0;
      }
      el.addEventListener('mouseenter', () => showTooltip(el));
      el.addEventListener('focus', () => showTooltip(el));
      el.addEventListener('mouseleave', () => hideTooltip());
      el.addEventListener('blur', () => hideTooltip());
    }

    function teamColor(teamName) {
      return teamColorByName.get(teamName) || '#7f94a7';
    }

    function getOverallPick(roundNumber, pickNumber) {
      return ((roundNumber - 1) * picksPerRound) + pickNumber;
    }

    function resetFilters() {
      state.q = '';
      state.team = '';
      state.round = '';
      state.keepersOnly = false;
      searchInput.value = '';
      teamSelect.value = '';
      roundSelect.value = '';
      keepersOnlyInput.checked = false;
    }

    function renderFilterTags() {
      activeFilters.innerHTML = '';

      const tags = [];
      if (state.q) {
        tags.push({ key: 'q', label: `Search: ${state.q}` });
      }
      if (state.team) {
        tags.push({ key: 'team', label: `Team: ${state.team}` });
      }
      if (state.view === 'team') {
        tags.push({ key: 'view', label: 'Mode: Team Timeline' });
      }
      if (state.keepersOnly) {
        tags.push({ key: 'keepers', label: 'Keepers only' });
      }
      if (state.round) {
        tags.push({ key: 'round', label: `Round: ${state.round}` });
      }

      tags.forEach((tag) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'filter-tag';
        btn.setAttribute('aria-label', `Remove ${tag.label} filter`);
        btn.innerHTML = `${tag.label}<span class="x">×</span>`;

            state.q = '';
            searchInput.value = '';
          } else if (tag.key === 'team') {
            state.team = '';
            teamSelect.value = '';
          } else if (tag.key === 'view') {
            state.view = 'round';
            viewSelect.value = 'round';

          } else if (tag.key === 'round') {
            state.round = '';
            roundSelect.value = '';
          } else if (tag.key === 'keepers') {
            state.keepersOnly = false;
            keepersOnlyInput.checked = false;
          }

      });

    function appendHighlightedText(parent, text, query) {
      if (!query) {
        parent.textContent = text;
        return;
      }

      const regex = new RegExp(escapeRegExp(query), 'ig');
      let lastIndex = 0;
      let match;

      while ((match = regex.exec(text)) !== null) {
        if (match.index > lastIndex) {
          parent.appendChild(document.createTextNode(text.slice(lastIndex, match.index)));
        }
        const mark = document.createElement('mark');
        mark.textContent = text.slice(match.index, match.index + match[0].length);
        parent.appendChild(mark);
        lastIndex = match.index + match[0].length;
      }

      if (lastIndex < text.length) {
        parent.appendChild(document.createTextNode(text.slice(lastIndex)));
      }
    }

    function buildPickRow(pick, roundNumber, query) {
      const item = document.createElement('li');
      item.className = 'pick-row';
      if (pick.player) {
        item.classList.add('has-keeper');
      }

      const roundPick = document.createElement('span');
      roundPick.className = 'round-pick';
      roundPick.textContent = `${pick.pick}`;

      const swatch = document.createElement('span');
      swatch.className = 'team-swatch';
      swatch.style.background = teamColor(pick.team);

      const main = document.createElement('div');
      main.className = 'pick-main';

      const teamName = document.createElement('span');
      teamName.className = 'team-name';
      appendHighlightedText(teamName, pick.team, query);

      const player = document.createElement('span');
      player.className = pick.player ? 'player' : 'player empty';
      const injury = getInjuryForPick(pick);
      if (pick.player) {
        if (pick.url) {
          const a = document.createElement('a');
          a.href = pick.url;
          a.target = '_blank';
          a.rel = 'noopener noreferrer';
          appendHighlightedText(a, pick.player, query);
          if (injury?.comment) {
            wireCommentTrigger(a, injury.comment);
          }
          player.appendChild(a);
        } else {
          appendHighlightedText(player, pick.player, query);
          if (injury?.comment) {
            wireCommentTrigger(player, injury.comment);
          }
        }

        if (injury) {
          const statusPill = document.createElement('span');
          statusPill.className = 'injury-pill';
          statusPill.textContent = injury.status;
          wireCommentTrigger(statusPill, injury.comment);
          player.appendChild(statusPill);
        }
      } else {
        player.textContent = 'Open pick';
      }

      const overall = document.createElement('span');
      overall.className = 'overall-cell';
      overall.textContent = `#${getOverallPick(roundNumber, pick.pick)}`;

      main.appendChild(teamName);
      main.appendChild(player);
      item.appendChild(roundPick);
      item.appendChild(swatch);
      item.appendChild(main);
      item.appendChild(overall);

      return item;
    }

    function matchesPick(pick, qLower, selectedTeam, keepersOnly) {

      if (!teamMatches) {

        return true;
      }

      return pick.team.toLowerCase().includes(qLower) || pick.player.toLowerCase().includes(qLower);
    }

    function renderInjuries(qLower, selectedTeam) {
      injuryBody.innerHTML = '';
      const filtered = getFilteredInjuries(qLower, selectedTeam);

      injurySummaryCount.textContent = `${filtered.length} / ${injuries.length}`;
      injuryEmpty.hidden = filtered.length !== 0;

      filtered.forEach((injury) => {
        const tr = document.createElement('tr');

        const playerTd = document.createElement('td');
        playerTd.setAttribute('data-label', 'Player');
        if (injury.comment) {
          const playerBtn = document.createElement('button');
          playerBtn.type = 'button';
          playerBtn.className = 'injury-inline-btn';
          playerBtn.textContent = `${injury.name} (${injury.pos})`;
          wireCommentTrigger(playerBtn, injury.comment);
          playerTd.appendChild(playerBtn);
        } else {
          playerTd.textContent = `${injury.name} (${injury.pos})`;
        }

        const teamTd = document.createElement('td');
        teamTd.setAttribute('data-label', 'MLB Team');
        teamTd.textContent = injury.mlbTeam || '—';

        const returnTd = document.createElement('td');
        returnTd.setAttribute('data-label', 'Return');
        returnTd.textContent = injury.estReturnDate || '—';

        const statusTd = document.createElement('td');
        statusTd.setAttribute('data-label', 'Status');
        if (injury.comment) {
          const statusBtn = document.createElement('button');
          statusBtn.type = 'button';
          statusBtn.className = 'injury-inline-btn injury-status-pill';
          statusBtn.textContent = injury.status || '—';
          wireCommentTrigger(statusBtn, injury.comment);
          statusTd.appendChild(statusBtn);
        } else {
          const statusSpan = document.createElement('span');
          statusSpan.className = 'injury-status-pill';
          statusSpan.textContent = injury.status || '—';
          statusTd.appendChild(statusSpan);
        }

        tr.appendChild(playerTd);
        tr.appendChild(teamTd);
        tr.appendChild(returnTd);
        tr.appendChild(statusTd);
        injuryBody.appendChild(tr);
      });
    }

    function updateUrl() {
      const url = new URL(window.location.href);
      url.searchParams.delete('q');
      url.searchParams.delete('team');
      url.searchParams.delete('view');
      url.searchParams.delete('round');
      url.searchParams.delete('keepers');

      if (state.q) {
        url.searchParams.set('q', state.q);
      }
      if (state.team) {
        url.searchParams.set('team', state.team);
      }
      if (state.keepersOnly) {
        url.searchParams.set('keepers', '1');
      }
      if (state.view === 'team') {
        url.searchParams.set('view', 'team');
      }
      if (state.view === 'round' && state.round) {
        url.searchParams.set('round', state.round);
      }

      history.replaceState(null, '', `${url.pathname}${url.search}${url.hash}`);
    }

    function scrollToRound(roundValue) {
      if (!roundValue) {
        return;
      }
      const target = document.getElementById(`round-${roundValue}`);
      if (target) {
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    }

    function render() {
      roundsEl.innerHTML = '';

      const q = state.q;
      const qLower = q.toLowerCase();
      const selectedTeam = state.team;
      const keepersOnly = state.keepersOnly;
      renderInjuries(qLower, selectedTeam);
      let shownPicks = 0;
      let shownTeamPicks = 0;

      if (state.view === 'round') {
        rounds.forEach((round) => {
          const filtered = round.picks.filter((pick) => matchesPick(pick, qLower, selectedTeam, keepersOnly));
          if (filtered.length === 0) {
            return;
          }

          const card = document.createElement('article');
          card.className = 'round';
          card.id = `round-${round.round}`;

          const h2 = document.createElement('h2');
          h2.textContent = `Round ${round.round}`;
          card.appendChild(h2);

          const list = document.createElement('ol');

          filtered.forEach((pick) => {
            shownPicks += 1;
            if (selectedTeam && pick.team === selectedTeam) {
              shownTeamPicks += 1;
            }
            list.appendChild(buildPickRow(pick, round.round, q));
          });

          card.appendChild(list);
          roundsEl.appendChild(card);
        });
      } else {
        const teamsToRender = selectedTeam ? [selectedTeam] : uniqueTeams;

        teamsToRender.forEach((teamName) => {
          const timelinePicks = [];
          rounds.forEach((round) => {
            round.picks.forEach((pick) => {
              if (pick.team !== teamName) {
                return;
              }
              if (keepersOnly && !pick.player) {
                return;
              }
              const matchesQuery = !qLower
                || pick.team.toLowerCase().includes(qLower)
                || pick.player.toLowerCase().includes(qLower);
              if (!matchesQuery) {
                return;
              }
              timelinePicks.push({ ...pick, round: round.round });
            });
          });

          timelinePicks.sort((a, b) => (a.round - b.round) || (a.pick - b.pick));
          if (timelinePicks.length === 0) {
            return;
          }

          const card = document.createElement('article');
          card.className = 'round';
          card.id = `team-${teamName.toLowerCase().replace(/[^a-z0-9]+/g, '-')}`;

          const h2 = document.createElement('h2');
          h2.textContent = teamName;
          h2.style.borderLeft = `4px solid ${teamColor(teamName)}`;
          h2.style.paddingLeft = '10px';
          card.appendChild(h2);

          const list = document.createElement('ol');
          timelinePicks.forEach((pick) => {
            shownPicks += 1;
            if (selectedTeam && pick.team === selectedTeam) {
              shownTeamPicks += 1;
            }
            list.appendChild(buildPickRow(pick, pick.round, q));
          });

          card.appendChild(list);
          roundsEl.appendChild(card);
        });
      }

      if (shownPicks === 0) {
        const empty = document.createElement('div');
        empty.className = 'no-results';
        empty.innerHTML = '<p>No picks match the current filters.</p>';
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = 'Reset filters';
        btn.addEventListener('click', () => {
          resetFilters();
          applyAndRender();
        });
        empty.appendChild(btn);
        roundsEl.appendChild(empty);
      }

      let summary = `Showing ${shownPicks} of ${totalPicks} picks`;
      if (selectedTeam) {
        summary += ` · ${selectedTeam}: ${shownTeamPicks} picks`;
      }
      if (state.view === 'round' && state.round && !document.getElementById(`round-${state.round}`)) {
        summary += ` · Round ${state.round} hidden by current filters`;
      }
      resultsSummary.textContent = summary;
      renderFilterTags();
    }

    function applyAndRender() {
      updateUrl();
      render();
    }

    searchInput.addEventListener('input', () => {
      state.q = searchInput.value.trim();
      applyAndRender();
    });

    teamSelect.addEventListener('change', () => {
      state.team = teamSelect.value;
      applyAndRender();
    });

    keepersOnlyInput.addEventListener('change', () => {
      state.keepersOnly = keepersOnlyInput.checked;
      applyAndRender();
    });

    viewSelect.addEventListener('change', () => {
      state.view = viewSelect.value;
      if (state.view === 'team') {
        state.round = '';
      }
      syncRoundControl();
      applyAndRender();
    });

    roundSelect.addEventListener('change', () => {
      if (state.view !== 'round') {
        return;
      }
      state.round = roundSelect.value;
      updateUrl();
      scrollToRound(state.round);
      renderFilterTags();
    });

    densityBtn.addEventListener('click', () => {
      state.density = state.density === 'compact' ? 'comfortable' : 'compact';
      document.body.classList.toggle('density-compact', state.density === 'compact');
      densityBtn.setAttribute('aria-pressed', String(state.density === 'compact'));
      densityBtn.textContent = state.density === 'compact' ? 'Comfortable view' : 'Compact view';
      localStorage.setItem('draftDensity', state.density);
    });

    clearBtn.addEventListener('click', () => {
      resetFilters();
      applyAndRender();
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape') {
        hideTooltip();
      }
    });
    window.addEventListener('scroll', hideTooltip, { passive: true });
    window.addEventListener('resize', hideTooltip);

    render();
    if (state.round) {
      setTimeout(() => scrollToRound(state.round), 0);
    }
  </script>
</body>
</html>
