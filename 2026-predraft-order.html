<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>2026 Fantasy Baseball Draft Order</title>
  <link rel="icon" type="image/png" href="img/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="img/favicon.svg" />
  <link rel="shortcut icon" href="img/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="img/apple-touch-icon.png" />
  <link rel="manifest" href="img/site.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <h1>2026 Fantasy Baseball Draft Order <span class="pill">From 2026.xlsx</span></h1>
    <p class="sub">Round order, traded picks, players, and player links are sourced from the spreadsheet.</p>

    <section class="controls" aria-label="Draft filters">
      <div class="control-group">
        <label for="searchInput">Search</label>
        <input id="searchInput" type="search" placeholder="Search player or team" autocomplete="off" />
      </div>
      <div class="control-group">
        <label for="teamSelect">Team</label>
        <select id="teamSelect">
          <option value="">All teams</option>
        </select>
      </div>
      <div class="control-group">
        <label for="viewSelect">Sort mode</label>
        <select id="viewSelect">
          <option value="round">By Round</option>
          <option value="team">By Team Timeline</option>
        </select>
      </div>
      <div class="control-group">
        <label for="roundSelect">Round jump</label>
        <select id="roundSelect">
          <option value="">Select round</option>
        </select>
      </div>
      <div class="control-group keepers-group">
        <label for="keepersOnly">Keepers</label>
        <label class="keepers-toggle" for="keepersOnly">
          <input id="keepersOnly" type="checkbox" />
          <span>Keepers only</span>
        </label>
      </div>
      <div class="control-actions">
        <button id="densityBtn" type="button" aria-pressed="false">Compact view</button>
        <button id="clearBtn" type="button">Clear filters</button>
      </div>
      <div id="resultsSummary" class="results" aria-live="polite"></div>
      <div id="activeFilters" class="filter-tags" aria-live="polite"></div>
    </section>

    <section class="injury-panel" aria-label="Injury report">
      <details id="injuryDetails">
        <summary>
          <span class="injury-summary-main">
            <span class="injury-toggle" aria-hidden="true"></span>
            <span>Injury Report</span>
            <span class="injury-summary-hint"></span>
          </span>
          <span id="injurySummaryCount" class="injury-summary-count" aria-live="polite"></span>
        </summary>
        <div class="injury-wrap">
          <table class="injury-table" aria-label="Injured players">
            <thead>
              <tr>
                <th class="injury-col-player">Player</th>
                <th class="injury-col-team">MLB Team</th>
                <th class="injury-col-return">Return</th>
                <th class="injury-col-status">Status</th>
              </tr>
            </thead>
            <tbody id="injuryBody"></tbody>
          </table>
          <div id="injuryEmpty" class="injury-empty" hidden>No injured players match the current filters.</div>
        </div>
      </details>
    </section>

    <section id="rounds" class="rounds" aria-label="Draft order by round"></section>
    <p class="legend">Team names are expanded from the truncated labels in the workbook.</p>
  </main>

  <div id="commentTooltip" class="injury-tooltip" role="tooltip" hidden></div>
  <script src="app.js"></script>
</body>
</html>
